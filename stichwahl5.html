## FEATURES (v1.0)
### Core Mechanic: Kano + Cityscape Fusion
- 8 political topics with Kano dual-question method (positive + negative framing)
- 5 answer options per question (Begeistert, Erwarte ich, Egal, Akzeptabel, Stoert mich)
- Kano matrix classifies each topic: Begeisterung, Leistung, Basis, Indifferent, Rueckweisung, Fraglich
- Swipe navigation between topics (from stichwahl1) with tap fallback
- Back/undo navigation on every question card
- Live CSS cityscape (from stichwahl3) updates as Kano classifications resolve
- Progress bar with topic counter

### Candidate Matching (wider spread)
- Weighted scoring replacing cosine similarity (5-95% range vs old 88-96%)
- Topic weights: Begeisterung=3, Leistung=2, Basis=1, Indifferent=0, Rueckweisung=-2, Fraglich=0
- Per-candidate score based on their topic attributions × Kano weight
- Non-partisan colours: indigo-500 / teal-500 (NOT party colours)
- Candidate order randomised per session
- 5:2 topic lean disclosed transparently

### Results Screen
- Kano profile summary with coloured pills and legend
- Cityscape postcard recap
- Candidate match bars with percentage
- Agreement framing (shared priorities highlighted)
- Per-topic cards with Kano pill + explainer + candidate attribution
- Tooltips on Kano categories explaining what each means
- Asymmetry insight card
- Hard stats with clickable source links
- Methodology link to methodik-check.html
- Share text with tie-breaking logic

### Design
- Single file, standalone HTML
- Alpine.js via vendor/alpine.min.js (deferred)
- Tailwind via shared styles.css
- Fortress Zero: no backend, no cookies, no tracking, no CDN
- Mobile-first (375px), max-w-lg centred, min 13px font
- Inter font family
- Munich jargon glossed (SEM, Radentscheid, Geothermie etc.)

### Screens (3)
1. Intro: concept explanation, Stichwahl badge, Munich skyline, CTA
2. Questions: 8 topic cards (2 sub-questions each), swipe/tap nav, live cityscape, progress
3. Results: Kano profile, cityscape, match, per-topic cards, sources, share, cross-nav

## CHANGELOG
### v1.0 - Initial build (best-of fusion)
- CREATED: Kano dual-questions from stichwahl4 + live cityscape from stichwahl3 + swipe from stichwahl1
- CREATED: Wider-spread scoring algorithm (replaces cosine similarity)
- CREATED: Back/undo navigation, Kano legend, clickable sources, jargon glossing
- CREATED: 5:2 lean disclosure, methodology link, tie-breaking share text
- CREATED: Min 13px font throughout, category tooltips

<!DOCTYPE html>
<html lang="de">
<head>

<title>München-Check: Was zählt für dich? | Stichwahl München 2026</title>

<style>
[x-cloak] { display: none !important; }

/* Animations */
.fade-in { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.progress-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.slide-up { animation: slideUp 0.35s ease-out both; }

/* Radio options */
.radio-opt { transition: all 0.15s ease; cursor: pointer; font-size: 14px; }
.radio-opt.selected { border-color: #ea580c; background: #fff7ed; }
@media (hover: hover) { .radio-opt:hover:not(.selected) { border-color: #d6d3d1; background: #fafaf9; } }

/* Kano pills */
.kano-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.kano-begeisterung { background: #d1fae5; color: #065f46; }
.kano-leistung { background: #dbeafe; color: #1e40af; }
.kano-basis { background: #e7e5e4; color: #44403c; }
.kano-indifferent { background: #f5f5f4; color: #78716c; }
.kano-rueckweisung { background: #fee2e2; color: #991b1b; }
.kano-fraglich { background: #fef3c7; color: #92400e; }
.bg-kano-begeisterung { background: #6ee7b7; }
.bg-kano-leistung { background: #93c5fd; }
.bg-kano-basis { background: #d6d3d1; }
.bg-kano-indifferent { background: #e7e5e4; }
.bg-kano-rueckweisung { background: #fca5a5; }
.bg-kano-fraglich { background: #fcd34d; }

/* Candidate badges */
.candidate-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 700; font-size: 13px; color: white; }

/* Match bars */
.match-bar { height: 32px; border-radius: 8px; transition: width 0.4s ease-out; min-width: 44px; display: flex; align-items: center; padding: 0 10px; }

/* Insight card */
.insight-card { border-left: 3px solid #3b82f6; }

/* Factoid */
.factoid { border-left: 3px solid #f59e0b; }

/* Cityscape */
.cityscape { position: relative; width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: linear-gradient(180deg, #bae6fd 0%, #e0f2fe 40%, #f0fdf4 100%); }
.city-layer { position: absolute; bottom: 0; left: 0; right: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Buildings (Wohnen) */
.layer-wohnen { display: flex; align-items: flex-end; justify-content: center; gap: 3px; padding: 0 10px; z-index: 2; }
.building { background: #78716c; border-radius: 3px 3px 0 0; transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Trees (Klima) */
.layer-klima { display: flex; align-items: flex-end; justify-content: space-around; padding: 0 16px; z-index: 3; }
.tree { width: 14px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.tree-top { background: #22c55e; border-radius: 50%; margin: 0 auto; }
.tree-trunk { width: 3px; background: #92400e; margin: 0 auto; }

/* Tram/Bike (Mobilität) */
.layer-mobil { height: 20px; z-index: 4; display: flex; align-items: center; padding: 0 12px; }
.tram-line { height: 2px; background: #0ea5e9; border-radius: 2px; transition: width 0.4s ease; }
.bike-dot { width: 6px; height: 6px; border-radius: 50%; background: #0ea5e9; margin-left: 4px; transition: opacity 0.3s; }

/* Streetlights (Sicherheit) */
.layer-sicher { display: flex; align-items: flex-end; justify-content: space-around; padding: 0 24px; z-index: 5; }
.streetlight { width: 2px; background: #fbbf24; border-radius: 2px; transition: height 0.4s ease; }
.light-glow { width: 10px; height: 10px; background: radial-gradient(circle, rgba(251,191,36,0.6) 0%, transparent 70%); border-radius: 50%; margin: 0 auto -3px auto; transition: opacity 0.3s; }

/* Wifi (Digital) */
.layer-digital { position: absolute; top: 14px; right: 14px; z-index: 6; }
.wifi-arc { border: 2px solid rgba(99,102,241,0.5); border-radius: 50%; border-bottom: none; border-left: none; transition: opacity 0.3s; }

/* Kultur (Isar) */
.layer-kultur { z-index: 1; }
.isar-stripe { height: 6px; background: linear-gradient(90deg, #67e8f9, #22d3ee, #67e8f9); transition: opacity 0.4s; }

/* Postcard label */
.postcard-label { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; z-index: 10; }

/* Tooltip */
.tooltip-trigger { position: relative; cursor: help; border-bottom: 1px dotted currentColor; }
.tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1c1917; color: #fafaf9; padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 400; width: max-content; max-width: 240px; z-index: 50; line-height: 1.4; margin-bottom: 6px; }
.tooltip-trigger:hover .tooltip-box, .tooltip-trigger:focus .tooltip-box { display: block; }

/* Source link */
.source-link { color: #78716c; text-decoration: underline; text-decoration-style: dotted; font-size: 13px; }
.source-link:hover { color: #ea580c; }
</style>
</head>

    { key: 'leistung', label: 'Leistung', short: 'mehr ist besser', tooltip: 'Je mehr der OB hier liefert, desto zufriedener bist du. Ein klassisches "mehr ist besser"-Thema.' },
    { key: 'basis', label: 'Basis', short: 'muss sein', tooltip: 'Das ist deine Grunderwartung. Wenn der OB das nicht liefert, bist du unzufrieden. Wenn doch, ist es selbstverständlich.' },
    { key: 'indifferent', label: 'Indifferent', short: 'egal', tooltip: 'Das Thema ist dir weder wichtig noch unwichtig. Es beeinflusst deine Zufriedenheit mit dem OB kaum.' },
    { key: 'rueckweisung', label: 'Rückweisung', short: 'will ich nicht', tooltip: 'Du lehnst die vorgeschlagene Richtung aktiv ab. Das Thema schreckt dich eher ab als dass es dich anzieht.' },
    { key: 'fraglich', label: 'Fraglich', short: 'unklar', tooltip: 'Deine Antworten ergeben kein klares Muster. Vielleicht ist deine Haltung differenzierter als die Frage zulässt.' }
  ];

  return {
    screen: 'intro',
    currentTopic: 0,
    answers: Array.from({ length: 8 }, () => ({ pos: null, neg: null })),
    topics: TOPICS,
    answerOptions: ANSWER_OPTIONS,
    kanoLegend: KANO_LEGEND,
    copied: false,

    get progressPct() {
      if (this.screen === 'intro') return 0;
      if (this.screen === 'questions') {
        const answered = this.answers.reduce((sum, a) => sum + (a.pos !== null ? 0.5 : 0) + (a.neg !== null ? 0.5 : 0), 0);
        return 5 + (answered / 8) * 85;
      }
      return 100;
    },

    get canAdvance() {
      const a = this.answers[this.currentTopic];
      return a && a.pos !== null && a.neg !== null;
    },

    setAnswer(type, idx) {
      this.answers[this.currentTopic][type] = idx;
    },

    nextTopic() {
      if (!this.canAdvance) return;
      if (this.currentTopic >= 7) {
        this.screen = 'results';
      } else {
        this.currentTopic++;
      }
    },

    // === Kano Classification ===
    getKanoCode(topicIdx) {
      const a = this.answers[topicIdx];
      if (a.pos === null || a.neg === null) return 'I';
      return KANO_MATRIX[a.neg][a.pos];
    },

    getKanoKey(topicIdx) {
      return KANO_KEYS[this.getKanoCode(topicIdx)];
    },

    getKanoLabel(topicIdx) {
      return KANO_LABELS[this.getKanoCode(topicIdx)];
    },

    getKanoExplainer(topicIdx) {
      const code = this.getKanoCode(topicIdx);
      return TOPICS[topicIdx].explainers[code] || '';
    },

    get kanoSummaryOrder() {
      const counts = { begeisterung: 0, leistung: 0, basis: 0, indifferent: 0, rueckweisung: 0, fraglich: 0 };
      for (let i = 0; i < 8; i++) {
        counts[this.getKanoKey(i)]++;
      }
      return KANO_LEGEND.map(l => ({
        ...l,
        count: counts[l.key]
      }));
    },

    // === Cityscape ===
    // Returns 0-1 for how much a city layer should show based on Kano classifications
    cityVal(cityId) {
      const topicIndices = TOPICS.map((t, i) => ({ idx: i, city: t.cityId }))
        .filter(t => t.city === cityId);
      if (topicIndices.length === 0) return 0.3;

      let total = 0;
      let count = 0;
      for (const t of topicIndices) {
        const code = this.getKanoCode(t.idx);
        const w = KANO_WEIGHTS[code] || 0;
        // Normalize: B=3 → 1.0, L=2 → 0.8, A=1 → 0.6, I=0 → 0.3, R=-2 → 0.1
        total += Math.max(0.1, Math.min(1.0, (w + 2) / 5));
        count++;
      }
      return count > 0 ? total / count : 0.3;
    },

    // === Candidate Matching (wider spread) ===
    candidateScore(candidateId) {
      const krauseTopics = [0, 1, 2, 3, 6]; // Wohnen, ÖPNV, Verkehr, Klima, Kultur
      const reiterTopics = [5, 7]; // Digital, Amtserfahrung
      const bothTopics = [4]; // Sicherheit

      let topics;
      if (candidateId === 'krause') topics = [...krauseTopics, ...bothTopics];
      else topics = [...reiterTopics, ...bothTopics];

      let score = 0;
      let maxScore = topics.length * 3; // Max is all Begeisterung

      for (const i of topics) {
        const code = this.getKanoCode(i);
        score += KANO_WEIGHTS[code] || 0;
      }

      // Normalize to 5-95% range with sigmoid-like spread
      const raw = maxScore > 0 ? score / maxScore : 0;
      // Map from [-1, 1] to [5, 95]
      const pct = Math.round(50 + raw * 45);
      return Math.max(5, Math.min(95, pct));
    },

    get displayCandidates() {
      return candidateOrder.map(key => ({
        key,
        ...CANDIDATES[key],
        pct: this.candidateScore(key)
      }));
    },

    // === Agreement Framing ===
    get sharedPriorities() {
      const shared = [];
      for (let i = 0; i < 8; i++) {
        const code = this.getKanoCode(i);
        if ((code === 'B' || code === 'L' || code === 'A') && TOPICS[i].candidateId === 'both') {
          shared.push(TOPICS[i].label);
        }
      }
      return shared;
    },

    // === Asymmetry Insight ===
    get asymmetryInsight() {
      const krauseTopics = [0, 1, 2, 3, 6];
      const reiterTopics = [5, 7];

      let krauseB = 0, krauseL = 0, krauseR = 0;
      let reiterB = 0, reiterL = 0, reiterA = 0;

      for (const i of krauseTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B') krauseB++;
        if (c === 'L') krauseL++;
        if (c === 'R') krauseR++;
      }
      for (const i of reiterTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B') reiterB++;
        if (c === 'L') reiterL++;
        if (c === 'A') reiterA++;
      }

      const parts = [];
      if (krauseB > 0) parts.push('<strong>' + krauseB + ' von Krauses Themen</strong> begeistern dich');
      if (reiterA > 0) parts.push('bei Reiters Themen erwartest du <strong>' + reiterA + '× Basis-Leistung</strong>, die du voraussetzt');
      if (reiterB > 0 && krauseB === 0) parts.push('<strong>' + reiterB + ' von Reiters Themen</strong> begeistern dich');
      if (krauseR >= 2) parts.push('<strong>' + krauseR + ' Krause-Themen</strong> lehnst du ab');

      if (parts.length === 0) {
        return 'Dein Profil zeigt keine starke Asymmetrie zwischen den Kandidaten. Beide haben Themen, die dir wichtig sind, und Themen, die dich weniger interessieren.';
      }

      let text = parts.join(', ');
      text = text.charAt(0).toUpperCase() + text.slice(1) + '.';

      if (reiterA > 0 && krauseB > 0) {
        text += ' <strong>Das heißt:</strong> Krauses Themen können dich positiv überraschen. Reiters Themen sind Pflicht, die du erwartest. Wenn Pflicht wichtiger ist als Begeisterung, spricht das für Reiter. Wenn du Aufbruch willst, spricht das für Krause.';
      }

      return text;
    },

    // === Top Factoid (based on top classified topic) ===
    get topFactoid() {
      // Find the topic with the strongest positive Kano classification
      let bestIdx = 0;
      let bestScore = -10;
      for (let i = 0; i < 8; i++) {
        const w = KANO_WEIGHTS[this.getKanoCode(i)] || 0;
        if (w > bestScore) { bestScore = w; bestIdx = i; }
      }
      return TOPICS[bestIdx].factoid;
    },

    get topFactoidSource() {
      let bestIdx = 0;
      let bestScore = -10;
      for (let i = 0; i < 8; i++) {
        const w = KANO_WEIGHTS[this.getKanoCode(i)] || 0;
        if (w > bestScore) { bestScore = w; bestIdx = i; }
      }
      return TOPICS[bestIdx].factoidSource;
    },

    get topFactoidUrl() {
      let bestIdx = 0;
      let bestScore = -10;
      for (let i = 0; i < 8; i++) {
        const w = KANO_WEIGHTS[this.getKanoCode(i)] || 0;
        if (w > bestScore) { bestScore = w; bestIdx = i; }
      }
      return TOPICS[bestIdx].factoidUrl || '#';
    },

    // === Share (with tie-breaking) ===
    get shareText() {
      const krauseTopics = [0, 1, 2, 3, 6];
      const reiterTopics = [5, 7];
      let krauseHot = [], reiterHot = [];

      for (const i of krauseTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B' || c === 'L') krauseHot.push(this.topics[i].label);
      }
      for (const i of reiterTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B' || c === 'L') reiterHot.push(this.topics[i].label);
      }

      // Tie-breaking: if equal count, use Basis topics as tiebreaker
      if (krauseHot.length === reiterHot.length && krauseHot.length > 0) {
        let krauseBasis = 0, reiterBasis = 0;
        for (const i of krauseTopics) { if (this.getKanoCode(i) === 'A') krauseBasis++; }
        for (const i of reiterTopics) { if (this.getKanoCode(i) === 'A') reiterBasis++; }
        const stronger = krauseBasis > reiterBasis ? 'Krause' : 'Reiter';
        const topics = stronger === 'Krause' ? krauseHot : reiterHot;
        return 'Mein München-Check: Bei ' + topics.join(', ') + ' bin ich nah bei ' + stronger + '. Und du? mucwahl.de/stichwahl5';
      }

      const stronger = krauseHot.length > reiterHot.length ? 'Krause' : 'Reiter';
      const hotTopics = stronger === 'Krause' ? krauseHot : reiterHot;

      if (hotTopics.length === 0) {
        return 'Mein München-Check: Keiner der Kandidaten trifft meine Kernthemen. Und bei dir? mucwahl.de/stichwahl5';
      }
      return 'Mein München-Check: Bei ' + hotTopics.join(', ') + ' bin ich nah bei ' + stronger + '. Und du? mucwahl.de/stichwahl5';
    },

    async nativeShare() {
      if (navigator.share) {
        try {
          await navigator.share({ title: 'München-Check', text: this.shareText, url: 'https://mucwahl.de/stichwahl5' });
        } catch(e) {}
      } else {
        this.copyShare();
      }
    },

    async copyShare() {
      try {
        await navigator.clipboard.writeText(this.shareText);
        this.copied = true;
        setTimeout(() => this.copied = false, 2000);
      } catch(e) {}
    },

    restart() {
      this.screen = 'intro';
      this.currentTopic = 0;
      this.answers = Array.from({ length: 8 }, () => ({ pos: null, neg: null }));
      this.copied = false;
    }
  };
}
</script>
